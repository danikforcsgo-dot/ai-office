<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Monitor - Trading Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>BTC/USDT</h1>
            <div class="ticker-stats">
                <div class="stat">
                    <span class="stat-label">24ч Макс</span>
                    <span class="stat-value" id="ticker-high">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">24ч Мин</span>
                    <span class="stat-value" id="ticker-low">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">24ч Объём</span>
                    <span class="stat-value" id="ticker-volume">--</span>
                </div>
            </div>
            <div class="price-info">
                <span id="current-price">--</span>
                <span id="price-change">--</span>
            </div>
        </header>
        <div class="main-layout">
            <div class="chart-area">
                <div class="interval-selector">
                    <button class="interval-btn" data-interval="1m">1м</button>
                    <button class="interval-btn" data-interval="5m">5м</button>
                    <button class="interval-btn" data-interval="15m">15м</button>
                    <button class="interval-btn" data-interval="1h">1ч</button>
                    <button class="interval-btn active" data-interval="4h">4ч</button>
                    <button class="interval-btn" data-interval="1d">1д</button>
                </div>
                <div id="chart"></div>
                <div class="status">
                    <span id="status-dot" class="dot disconnected"></span>
                    <span id="status-text">Подключение...</span>
                </div>
            </div>
            <div class="right-panel">
                <div class="orderbook-panel">
                    <h3>Стакан</h3>
                    <div class="orderbook-content">
                        <div class="orderbook-asks" id="orderbook-asks"></div>
                        <div class="orderbook-spread" id="orderbook-spread">--</div>
                        <div class="orderbook-bids" id="orderbook-bids"></div>
                    </div>
                </div>
                <div class="signals-panel">
                    <div class="signals-header">
                        <h2>Сигналы</h2>
                        <div class="signals-stats">
                            <span class="buy-count" id="buy-count">0 BUY</span>
                            <span class="sell-count" id="sell-count">0 SELL</span>
                        </div>
                    </div>
                    <div class="confluence-area" id="confluence-area">
                        <div class="no-confluence">Анализ 50 скриптов...</div>
                    </div>
                    <div class="signals-filter">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="BUY">Покупка</button>
                        <button class="filter-btn" data-filter="SELL">Продажа</button>
                    </div>
                    <div class="signals-list" id="signals-list">
                        <div class="no-signals">Ожидание сигналов...</div>
                    </div>
                    <div class="scripts-info">
                        <span id="scripts-count">50</span> скриптов TradingView активно
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
